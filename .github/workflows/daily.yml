name: Daily MLB Predictions

on:
  schedule:
    # Blind every-30-min polling (a prior version of this file) wastes runs
    # on hours nothing is happening (2am, mid-afternoon lulls) while treating
    # every hour as equally likely to matter. MLB start times aren't random
    # -- they cluster into a few real waves (day games ~12:00-1:40pm ET,
    # main evening wave ~6:35-7:15pm, later evening wave ~7:15-8:15pm, west
    # coast night games ~9:35-10:20pm). These 8 times target "~2h before
    # each cluster, plus a closer catch-up in case a lineup posts late" --
    # informed by the slate's usual shape rather than either 2 fixed times a
    # day or brute-force high-frequency polling. All times ET, MLB season is
    # entirely within EDT (UTC-4) so no DST-transition edge case here.
    - cron: "0 13 * * *"   # 09:00 ET -- early sweep: probables, early lineups
    - cron: "0 15 * * *"   # 11:00 ET -- ~2h before the day-game wave
    - cron: "0 17 * * *"   # 13:00 ET -- day-game catch-up
    - cron: "0 20 * * *"   # 16:00 ET -- early look at the evening wave
    - cron: "30 21 * * *"  # 17:30 ET -- evening wave's core posting window
    - cron: "0 23 * * *"   # 19:00 ET -- ~2h before west coast wave + late evening catch-up
    - cron: "30 0 * * *"   # 20:30 ET -- west coast wave's core posting window
    - cron: "0 2 * * *"    # 22:00 ET -- final sweep
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Build predictions
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          APP_API_KEY: ${{ secrets.APP_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python build.py

      - name: Commit JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs
          git commit -m "Update $(date -u +%F)" || echo "nothing to commit"
          git push
