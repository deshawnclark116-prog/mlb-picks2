name: Daily MLB Predictions

on:
  schedule:
    # Was 2x/day (13:00, 17:00 UTC) -- too coarse to catch each game's lineup
    # near when it actually posts (1-3h before first pitch, staggered across
    # the whole slate). run_predictions() re-scans all pregame games and only
    # acts on whichever are currently confirmed, so polling every 30 min
    # across the hours MLB games realistically start (11:00-23:30 ET, i.e.
    # 15:00-23:59 + 00:00-03:30 UTC) means no game is ever more than ~30 min
    # stale relative to its lineup posting, without needing to compute a
    # per-game trigger time (GH Actions cron can't do that dynamically).
    - cron: "*/30 15-23 * * *"
    - cron: "*/30 0-3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Build predictions
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          APP_API_KEY: ${{ secrets.APP_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python build.py

      - name: Commit JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs
          git commit -m "Update $(date -u +%F)" || echo "nothing to commit"
          git push
